name: Docker Image Build

permissions:
  contents: read
  packages: write

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "Makefile"
      - "package.json"
      - "server.js"
      - "camofox.config.json"
      - "lib/**"
      - "plugins/**"
      - "scripts/**"
      - ".github/workflows/docker-build.yml"
  push:
    branches:
      - master
    paths:
      - "Dockerfile"
      - "Makefile"
      - "package.json"
      - "server.js"
      - "camofox.config.json"
      - "lib/**"
      - "plugins/**"
      - "scripts/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

concurrency:
  group: docker-image-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64

    env:
      DOCKER_BUILDKIT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache pre-downloaded binaries
        uses: actions/cache@v4
        with:
          path: dist
          key: dist-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Makefile') }}

      - name: Build Docker image via Makefile
        run: make build ARCH=${{ matrix.arch }}

      - name: Resolve image tags
        id: meta
        if: github.event_name != 'pull_request'
        run: |
          VERSION="$(sed -n 's/^VERSION[[:space:]]*?=[[:space:]]*//p' Makefile | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "Failed to read VERSION from Makefile" >&2
            exit 1
          fi
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=$GHCR_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          LOCAL_TAG="camofox-browser:${{ steps.meta.outputs.version }}-${{ matrix.arch }}"
          VERSION_TAG="${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.version }}-${{ matrix.arch }}"
          SHA_TAG="${{ steps.meta.outputs.ghcr_image }}:sha-${GITHUB_SHA::12}-${{ matrix.arch }}"
          ARCH_TAG="${{ steps.meta.outputs.ghcr_image }}:${{ matrix.arch }}"
          LATEST_TAG="${{ steps.meta.outputs.ghcr_image }}:latest"

          docker image inspect "$LOCAL_TAG" > /dev/null
          docker tag "$LOCAL_TAG" "$VERSION_TAG"
          docker tag "$LOCAL_TAG" "$SHA_TAG"
          docker tag "$LOCAL_TAG" "$ARCH_TAG"
          docker push "$VERSION_TAG"
          docker push "$SHA_TAG"
          docker push "$ARCH_TAG"

          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            docker tag "$LOCAL_TAG" "$LATEST_TAG"
            docker push "$LATEST_TAG"
          fi
